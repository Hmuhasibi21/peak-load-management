version: '3.8'

services:
  # 1. API Service (Golang)
  api:
    container_name: elasticsix_api
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - elasticsix_net

  # 2. Database (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: elasticsix_postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bank_a_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - elasticsix_net

  # 3. Caching (Redis)
  redis:
    image: redis:7-alpine
    container_name: elasticsix_redis
    ports:
      - "6379:6379"
    networks:
      - elasticsix_net

  # 4. Message Queue (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: elasticsix_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - elasticsix_net

  # ==========================================
  # NEW: OBSERVABILITY & MONITORING LAYER
  # ==========================================

  # 5. Prometheus (Pengepul Metrik)
  prometheus:
    image: prom/prometheus:latest
    container_name: elasticsix_prometheus
    ports:
      - "9090:9090"
    volumes:
      # Menyambungkan file prometheus.yml yang tadi kita buat ke dalam container
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - elasticsix_net

  # 6. Grafana (Dashboard Visualisasi)
  grafana:
    image: grafana/grafana:latest
    container_name: elasticsix_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    depends_on:
      - prometheus
    networks:
      - elasticsix_net
  
  # 7. Redis Exporter (Pengepul Metrik Cache)
  redis-exporter:
    image: oliver006/redis_exporter:alpine
    container_name: elasticsix_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - elasticsix_net
      

networks:
  elasticsix_net:
    driver: bridge

volumes:
  pgdata: