events { 
    worker_connections 2048; 
}

http {
    # ==========================================
    # LOAD BALANCER: 3 Instance API (Round-Robin)
    # ==========================================
    upstream elasticsix_api {
        # NGINX akan mendistribusikan traffic secara merata ke 3 server
        server elasticsix_api_1:8080;
        server elasticsix_api_2:8080;
        server elasticsix_api_3:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://elasticsix_api;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass_header X-Simulated-IP;

            # [SRE] Tambahan header untuk tracking instance mana yang memproses
            add_header X-Upstream-Server $upstream_addr always;
        }
    }
}