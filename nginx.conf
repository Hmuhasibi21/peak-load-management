events { 
    worker_connections 1024; 
}

http {
    upstream elasticsix_api {
        # FIX: Gunakan nama container resminya yaitu "elasticsix_api"
        server elasticsix_api:8080;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://elasticsix_api;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass_header X-Simulated-IP;
        }
    }
}